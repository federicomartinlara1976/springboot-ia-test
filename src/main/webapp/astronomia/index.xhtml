<?xml version="1.0" encoding="UTF-8"?>

<ui:composition xmlns:h="jakarta.faces.html"

	xmlns:pe="http://primefaces.org/ui/extensions"
	template="/WEB-INF/templates/template.xhtml">

	<ui:define name="content">
		<p:outputPanel styleClass="dashboard">

					<p:toolbarGroup align="left">
						<p:breadCrumb>
				            <p:menuitem value="Inicio" action="index"/>

					<p:toolbarGroup align="right">
						<h5><h:outputText value="Astronomía"/></h5>

				</p:toolbar>
			</p:outputPanel>
		
			<!-- Tarjeta de bienvenida -->
			<p:panel styleClass="ui-g-12 ui-md-12 ui-lg-12">
				<f:facet name="header">
					<i class="pi pi-star-fill"></i>
	                Astronomía
	            </f:facet>
	
				<p class="p-m-0">Sistema experto de Astronomía</p>
			</p:panel>
			
			<p:panel styleClass="ui-g-12 ui-md-12 ui-lg-12">
				<f:facet name="header">
					<i class="pi pi-list"></i>
	                Menú principal
	            </f:facet>
	
				<p:outputPanel styleClass="ui-g-12 ui-md-12 ui-lg-12">
				</p:outputPanel>

		</p:outputPanel>
