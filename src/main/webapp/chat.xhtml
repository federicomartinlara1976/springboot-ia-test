<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns:h="jakarta.faces.html"
	xmlns:f="jakarta.faces.core" xmlns:ui="jakarta.faces.facelets"
	xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions"
	template="/WEB-INF/templates/template.xhtml">

	<ui:define name="content">
		<p:outputPanel styleClass="dashboard">
			
			<p:outputPanel styleClass="ui-g-12 ui-md-12 ui-lg-4">
				<!-- Formulario de envío al chat -->
				<p:panel styleClass="ui-g-12 ui-md-12 ui-lg-12">
					<f:facet name="header">
						<i class="pi pi-send"></i>
		             	Pregunta
		       		</f:facet>
		              
		         	<f:facet name="actions">
		         		<p:outputLabel for="models" >Modelos</p:outputLabel>
						<p:selectOneMenu id="models"
							value="#{chatBean.selectedChatModel}">
	
							<f:selectItems value="#{chatBean.options}"/>
	
							<p:ajax event="valueChange"
								listener="#{chatBean.modelChanged}"/>
	
						</p:selectOneMenu>
			            
			            <p:commandButton id="send" icon="pi pi-send" process="mensaje @this" update="respuesta"
			            	actionListener="#{chatBean.enviar}"
							styleClass="edit-button rounded-button ui-button-success"
							disabled="#{chatBean.status eq 'RUNNING'}" />
			            
					</f:facet>
		
					<div class="ui-g ui-fluid">
						<div class="ui-g-12">
							<p:inputTextarea id="mensaje" value="#{chatBean.mensaje}"
								placeholder="Escribe el mensaje..." 
								rows="10" cols="50" widgetVar="mensajeWidget" />
						</div>
					</div>
		
				</p:panel>
				
				<!-- Historial de la conversación -->
				<p:panel id="historial" styleClass="ui-g-12 ui-md-12 ui-lg-12">
					<f:facet name="header">
						<i class="pi pi-list-check"></i>
		             	Historial
		       		</f:facet>
		
					<div class="ui-g ui-fluid">
						<p:dataView var="message" value="#{chatBean.historial}" rows="5" paginator="true"
		                    rowsPerPageTemplate="5,10,15" paginatorPosition="top"
		                    paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
		                    gridIcon="pi pi-th-large" listIcon="pi pi-bars">

				            <p:dataViewListItem>
				                <div class="product-list-item">
				                    <div class="product-list-detail">
				                        <div class="product-name">#{message.text}</div>
				                    </div>
				                </div>
				            </p:dataViewListItem>
				        </p:dataView>	
					</div>
		
				</p:panel>
			
			</p:outputPanel>
			
			<p:outputPanel styleClass="ui-g-12 ui-md-12 ui-lg-8">
				<!-- Respuesta del chat -->
				<p:panel id="respuesta" styleClass="ui-g-12 ui-md-12 ui-lg-12">
					<f:facet name="header">
						<i class="pi pi-send"></i>
		                  Respuesta
		         	</f:facet>
		
					<f:facet name="actions">
			            <p:commandLink styleClass="ui-panel-titlebar-icon ui-corner-all ui-state-default" title="Info"
			            	rendered="#{not empty chatBean.htmlContent}"
			            	disabled="#{chatBean.status eq 'RUNNING'}"
			            	oncomplete="PF('infoDialog').show()">
			                    <h:outputText styleClass="ui-icon pi pi-info-circle"/>
			            </p:commandLink>
			            
					</f:facet>
		
					<div class="ui-g ui-fluid">
						<div class="ui-g-12 overflow" style="height:450px;">
	        				<h:outputText value="#{chatBean.htmlContent}" escape="false" />
						</div>
					</div>
		
					<!-- Poll que cada 1 segundo actualiza el panel de respuesta -->
		    		<p:poll interval="1" update="send,respuesta,info-content,messages,historial" 
		            	listener="#{chatBean.checkUpdates}" 
		            	autoStart="true" 
		            	stop="#{not chatBean.pollActive}" />
		
				</p:panel>
			</p:outputPanel>
            	
		</p:outputPanel>
		
		<p:dialog id="infoDialog" header="Response info" showEffect="fade"
			modal="true" widgetVar="infoDialog" responsive="true" position="center"
			resizable="false"
			appendTo="@(body)">
			<p:outputPanel id="info-content" class="ui-fluid">
				<div class="field ui-g-12">
					<div class="ui-g-4">
						<span><b>Id</b></span>
					</div>
					<div class="ui-g-8">
						<span><h:outputText value="#{chatBean.chatResponseMetadata.id}"/></span>
					</div>
				</div>
				<div class="field ui-g-12">
					<div class="ui-g-4">
						<span><b>Ellapsed time</b></span>
					</div>
					<div class="ui-g-8">
						<span><h:outputText value="#{chatBean.ellapsedTime}"/> milliseconds</span>
					</div>
				</div>
				<div class="ui-g-12">
					<div class="ui-g-4">
						<span><b>Usage</b></span>
					</div>
					<div class="ui-g-8">
						<p:panelGrid columns="2" layout="grid">
		                    <p:outputLabel value="Prompt tokens:" />
		                    <p:outputLabel value="#{chatBean.chatResponseMetadata.usage.promptTokens}" />
		                    
		                    <p:outputLabel value="Completion tokens:" />
		                    <p:outputLabel value="#{chatBean.chatResponseMetadata.usage.completionTokens}" />
		                    
		                    <p:outputLabel value="Total tokens:" />
		                    <p:outputLabel value="#{chatBean.chatResponseMetadata.usage.totalTokens}" />
		                    
		                </p:panelGrid>
					</div>
				</div>
			</p:outputPanel>
		</p:dialog>
		
	</ui:define>
</ui:composition>
