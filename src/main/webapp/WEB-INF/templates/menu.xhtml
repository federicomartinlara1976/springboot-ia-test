<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui">
	
	<p:outputPanel id="menu" layout="block" styleClass="menu">
		<ul class="list-group">
			<li class="list-group-item">
				<h:commandLink
					action="index" inmediate="true" process="@this">
					<i class="pi pi-fw pi-home"></i>
					<span><h:outputText value="Inicio" /></span>
				</h:commandLink>
			</li>
		</ul>
		<p:accordionPanel activeIndex="-1">
			<p:tab title="Chat">
				<ul class="list-group">
					<li class="list-group-item">
						<h:commandLink
							action="chat" inmediate="true" process="@this">
							<i class="pi pi-fw pi-comments"></i>
							<span><h:outputText value="Chat" /></span>
						</h:commandLink>
					</li>
				</ul>
				<p:dataView id="conversations" var="conversation" value="#{sessionBean.conversations}" rows="5" paginator="true"
                    rowsPerPageTemplate="5,10,15" paginatorPosition="top"
                    paginatorTemplate="{PreviousPageLink} {PageLinks} {NextPageLink}"
                    gridIcon="pi pi-th-large" listIcon="pi pi-bars">

		            <p:dataViewListItem>
		                <div class="product-list-item">
		                    <div class="product-list-detail">
		                        <div class="product-name">#{conversation.nombre}</div>
		                    </div>
		                    
		                    <div class="product-list-action">
		                        <p:button icon="pi pi-eye"
		                        	outcome="chat"
									styleClass="edit-button rounded-button ui-button-success">
									<f:param name="id" value="#{conversation.conversationId}" />
								</p:button>
								<p:commandButton icon="pi pi-trash"
									oncomplete="PF('deleteDialog').show()"
									styleClass="edit-button rounded-button ui-button-success">
									<f:setPropertyActionListener value="#{conversation}"
										target="#{sessionBean.selectedConversation}" />
								</p:commandButton>
		                    </div>
		                </div>
		            </p:dataViewListItem>
		        </p:dataView>
		        
		        <p:confirmDialog widgetVar="deleteDialog" showEffect="fade"
					width="300" message="Desea borrar la conversación?"
					header="Confirmación" severity="warn" appendTo="@(form)">
					<p:commandButton value="Si" icon="pi pi-check"
						actionListener="#{sessionBean.deleteConversation}" process="@this"
						update="conversations,messages"
						oncomplete="PF('deleteDialog').hide()" />
					<p:commandButton value="No" type="button"
						styleClass="ui-button-secondary" icon="pi pi-times"
						onclick="PF('deleteDialog').hide()" />
				</p:confirmDialog>
			</p:tab>
			<p:tab title="Tests">
				<ul class="list-group">
					<li class="list-group-item">
						<h:commandLink
							action="testEntidad" inmediate="true" process="@this">
							<i class="pi pi-fw pi-user"></i>
							<span><h:outputText value="Devolver una entidad" /></span>
						</h:commandLink>
					</li>
					<li class="list-group-item">
						<h:commandLink
							action="testListEntidad" inmediate="true" process="@this">
							<i class="pi pi-fw pi-list"></i>
							<span><h:outputText value="Devolver una lista de entidades" /></span>
						</h:commandLink>
					</li>
					<li class="list-group-item">
						<h:commandLink
							action="testEntidadFormato" inmediate="true" process="@this">
							<i class="pi pi-fw pi-user"></i>
							<span><h:outputText value="Lista de actores" /></span>
						</h:commandLink>
					</li>
					<li class="list-group-item">
						<h:commandLink
							action="testListaFestivos" inmediate="true" process="@this">
							<i class="pi pi-fw pi-calendar"></i>
							<span><h:outputText value="Lista de festivos" /></span>
						</h:commandLink>
					</li>
				</ul>
			</p:tab>
			<p:tab title="Temas">
				<ul class="list-group">
					<li class="list-group-item">
						<h:commandLink
							action="temaAstronomia" inmediate="true" process="@this">
							<i class="pi pi-fw pi-star"></i>
							<span><h:outputText value="Astronomía" /></span>
						</h:commandLink>
					</li>
					<li class="list-group-item">
						<h:commandLink
							action="temaProgramacion" inmediate="true" process="@this">
							<i class="pi pi-fw pi-star"></i>
							<span><h:outputText value="Programación" /></span>
						</h:commandLink>
					</li>
				</ul>
			</p:tab>
		</p:accordionPanel>
	</p:outputPanel>

</ui:composition>
