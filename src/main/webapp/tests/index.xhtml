<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns:h="jakarta.faces.html"
	xmlns:f="jakarta.faces.core" xmlns:ui="jakarta.faces.facelets"
	xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions"
	template="/WEB-INF/templates/template.xhtml">

	<ui:define name="content">
		<p:outputPanel styleClass="dashboard">
			<p:outputPanel styleClass="ui-g-12" style="padding: 1em;">
				<p:toolbar id="toolbar">
					<p:toolbarGroup align="left">
						<p:breadCrumb>
				            <p:menuitem value="Inicio" action="index"/>
				            <p:menuitem value="Tests" disabled="true"/>
				        </p:breadCrumb>	
					</p:toolbarGroup>
					<p:toolbarGroup align="right">
						<h5><h:outputText value="Tests"/></h5>
					</p:toolbarGroup>
				</p:toolbar>
			</p:outputPanel>
			
			<p:panel styleClass="ui-g-12 ui-md-12 ui-lg-12">
				<f:facet name="header">
					<i class="pi pi-list"></i>
	                Menú principal
	            </f:facet>
				
				<div class="ui-g ui-fluid">
					<div class="ui-g-12">
        				<p:outputPanel styleClass="ui-g-12 ui-lg-3">
        					<div class="card shadow">
        						<p:commandLink action="testEntidad">
	        						<p:graphicImage styleClass="card-img-top" title="Chat"
										value="#{resource['images/usuario.png']}"
										style="width: 128px"/>
									<div class="card-body">
										<h5 class="card-title">Devolver una entidad</h5>
									</div>
								</p:commandLink>
        					</div>
        				</p:outputPanel>
        				<p:outputPanel styleClass="ui-g-12 ui-lg-3">
        					<div class="card shadow">
        						<p:commandLink action="testListEntidad">
	        						<p:graphicImage styleClass="card-img-top" title="Chat"
										value="#{resource['images/dna-test.png']}"
										style="width: 128px"/>
									<div class="card-body">
										<h5 class="card-title">Devolver una lista de entidades</h5>
									</div>
								</p:commandLink>
        					</div>
        				</p:outputPanel>
        				<p:outputPanel styleClass="ui-g-12 ui-lg-3">
        					<div class="card shadow">
        						<p:commandLink action="testEntidadFormato">
	        						<p:graphicImage styleClass="card-img-top" title="Chat"
										value="#{resource['images/usuario.png']}"
										style="width: 128px"/>
									<div class="card-body">
										<h5 class="card-title">Películas de un actor</h5>
									</div>
								</p:commandLink>
        					</div>
        				</p:outputPanel>
        				<p:outputPanel styleClass="ui-g-12 ui-lg-3">
        					<div class="card shadow">
        						<p:commandLink action="testListaFestivos">
	        						<p:graphicImage styleClass="card-img-top" title="Chat"
										value="#{resource['images/abril.png']}"
										style="width: 128px"/>
									<div class="card-body">
										<h5 class="card-title">Lista de festivos</h5>
									</div>
								</p:commandLink>
        					</div>
        				</p:outputPanel>
        				<p:outputPanel styleClass="ui-g-12 ui-lg-3">
        					<div class="card shadow">
        						<p:commandLink action="testMultimodal">
	        						<p:graphicImage styleClass="card-img-top" title="Chat"
										value="#{resource['images/scheme.png']}"
										style="width: 128px"/>
									<div class="card-body">
										<h5 class="card-title">Test multimodal</h5>
									</div>
								</p:commandLink>
        					</div>
        				</p:outputPanel>	
					</div>
				</div>
			</p:panel>
			
		</p:outputPanel>
		
	</ui:define>
</ui:composition>
