<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns:h="jakarta.faces.html"
	xmlns:f="jakarta.faces.core" xmlns:ui="jakarta.faces.facelets"
	xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions"
	template="/WEB-INF/templates/template.xhtml">

	<ui:define name="content">
		<p:outputPanel styleClass="dashboard">
		
			<p:outputPanel styleClass="ui-g-12">
				<p:toolbar id="toolbar">
					<p:toolbarGroup align="left">
						<p:breadCrumb>
							<p:menuitem value="Inicio" action="index"/>
				            <p:menuitem value="Tests" action="tests"/>
				            <p:menuitem value="Tool calling" disabled="true"/>
				        </p:breadCrumb>		
					</p:toolbarGroup>
					<p:toolbarGroup align="right">
						<h5><h:outputText value="Tool calling"/></h5>
					</p:toolbarGroup>
				</p:toolbar>
			</p:outputPanel>
			
			<!-- Formulario de envío al chat -->
			<p:panel id="peticion" styleClass="ui-g-12 ui-md-12 ui-lg-4">
				<f:facet name="header">
					<i class="pi pi-send"></i>
	             	Pregunta
	       		</f:facet>
	              
	         	<f:facet name="actions">
	         		<p:outputLabel for="models" >Modelos</p:outputLabel>
					<p:selectOneMenu id="models"
						value="#{toolCallingChatBean.selectedChatModel}">

						<f:selectItems value="#{toolCallingChatBean.options}"/>

						<p:ajax event="valueChange"
							listener="#{toolCallingChatBean.modelChanged}"/>

					</p:selectOneMenu>
		            
		            <p:commandButton id="send" icon="pi pi-send" process="mensaje @this" update="respuesta,updater"
		            	actionListener="#{toolCallingChatBean.enviar}"
						styleClass="edit-button rounded-button ui-button-success"
						disabled="#{toolCallingChatBean.status eq 'RUNNING'}" />
		            
				</f:facet>
	
				<div class="ui-g ui-fluid">
					<div class="ui-g-12">
						<p:inputTextarea id="mensaje" value="#{toolCallingChatBean.mensaje}"
							placeholder="Escribe el mensaje..." 
							rows="10" cols="50" widgetVar="mensajeWidget" 
							disabled="#{toolCallingChatBean.status eq 'RUNNING'}"/>
					</div>
				</div>
	
			</p:panel>
			
		</p:outputPanel>
			
		<p:outputPanel styleClass="ui-g-12 ui-md-12 ui-lg-8">
			<!-- Respuesta del chat -->
			<p:panel id="respuesta" styleClass="ui-g-12 ui-md-12 ui-lg-12">
				<f:facet name="header">
					<i class="pi pi-send"></i>
	                  Respuesta
	         	</f:facet>
	
				<div class="ui-g ui-fluid">
					<div class="ui-g-12 overflow" style="height:650px;">
        				<h:outputText value="#{toolCallingChatBean.htmlContent}" escape="false" />
					</div>
				</div>
	
			</p:panel>
			
			<!--  
				Se usa un poll que vaya actualizando la respuesta 
			    cada 50ms ya que se obtiene de forma reactiva 
			-->
    		<p:poll id="updater" interval="50" intervalType="millisecond" 
    			update="peticion,respuesta" 
            	listener="#{toolCallingChatBean.checkUpdates}" 
            	autoStart="true" 
            	stop="#{not toolCallingChatBean.pollActive}" />
		</p:outputPanel>
		
	</ui:define>
</ui:composition>
