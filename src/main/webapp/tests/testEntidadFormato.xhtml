<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns:h="jakarta.faces.html"
	xmlns:f="jakarta.faces.core" xmlns:ui="jakarta.faces.facelets"
	xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions"
	template="/WEB-INF/templates/template.xhtml">

	<ui:define name="content">
		<p:outputPanel styleClass="dashboard">
		
			<p:outputPanel styleClass="ui-g-12" style="padding: 1em;">
				<p:toolbar id="toolbar">
					<p:toolbarGroup align="left">
						<p:breadCrumb>
				            <p:menuitem value="Electronics"/>
				            <p:menuitem value="Computer"/>
				            <p:menuitem value="Notebook"/>
				            <p:menuitem value="Accessories"/>
				            <p:menuitem value="Backpacks"/>
				            <p:menuitem value="Item"/>
				        </p:breadCrumb>		
					</p:toolbarGroup>
					<p:toolbarGroup align="right">
						<h5><h:outputText value="Películas de un actor"/></h5>
					</p:toolbarGroup>
				</p:toolbar>
			</p:outputPanel>
			
			<!-- Formulario de envío al chat -->
			<p:panel styleClass="ui-g-12 ui-md-12 ui-lg-6">
				<f:facet name="header">
					<i class="pi pi-send"></i>
	             	Pregunta
	       		</f:facet>
	       		
	       		<f:facet name="actions">
	         		<p:outputLabel for="models" >Modelos</p:outputLabel>
					<p:selectOneMenu id="models"
						value="#{chatBean.selectedChatModel}">

						<f:selectItems value="#{chatBean.options}"/>

						<p:ajax event="valueChange"
							listener="#{chatBean.modelChanged}"/>

					</p:selectOneMenu>
		            
		            <p:commandButton icon="pi pi-replay" process="@form" update="respuesta"
		            	actionListener="#{testEntidadFormatoBean.request}"
						styleClass="edit-button rounded-button ui-button-success"/>
		            
				</f:facet>
	              
				<div class="ui-g ui-fluid">
					<div class="ui-g-12">
						<p:outputLabel for="actor">Actor</p:outputLabel>
						<p:inputText id="actor" value="#{testEntidadFormatoBean.actor}">
							<f:validateBean for="actor"/>
						</p:inputText>
					</div>
				</div>
	
			</p:panel>
			
			<!-- Respuesta del chat -->
			<p:panel id="respuesta" styleClass="ui-g-12 ui-md-12 ui-lg-6">
				<f:facet name="header">
					<i class="pi pi-send"></i>
	                  <h:outputText value="#{testEntidadFormatoBean.actorFilms.actor}"/>
	         	</f:facet>
	
				<div class="ui-g ui-fluid">
					<div class="ui-g-12">
        				<p:dataView var="movie" value="#{testEntidadFormatoBean.actorFilms.movies}" rows="5" paginator="true"
		                    rowsPerPageTemplate="5,10,15"  paginatorPosition="top"
		                    paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
		                    gridIcon="pi pi-th-large" listIcon="pi pi-bars">

				            <p:dataViewListItem>
				                <div class="product-list-item">
				                    <div class="product-list-detail">
				                        <div class="product-name">#{movie}</div>
				                    </div>
				                </div>
				            </p:dataViewListItem>
				        </p:dataView>
					</div>
				</div>
	
			</p:panel>
		</p:outputPanel>
		
	</ui:define>
</ui:composition>
