<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns:h="jakarta.faces.html"
	xmlns:f="jakarta.faces.core" xmlns:ui="jakarta.faces.facelets"
	xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions"
	template="/WEB-INF/templates/template.xhtml">

	<ui:define name="content">
		<p:outputPanel styleClass="dashboard">
			<!-- Tarjeta de bienvenida -->
			<p:panel styleClass="ui-g-12 ui-md-12 ui-lg-12">
				<f:facet name="header">
					<i class="pi pi-star-fill"></i>
	                Aplicación de IA generativa
	                </f:facet>
	
				<p class="p-m-0">Esta es una aplicación modular que demuestra las
					funcionalidades de <b>Spring</b> de IA generativa</p>
				<ul>
					<li>JSF con <b>Primefaces</b></li>
					<li>
						<span>IA generativa</span>
						<ul>
							<li><b>Principal: </b>Mistral AI</li>
							<li><b>Opcionales: </b>Deepseek, Anthropic</li>
						</ul>
					</li>
				</ul>
			</p:panel>
			
			<p:panel styleClass="ui-g-12 ui-md-12 ui-lg-12" header="Opciones">
	
				<div class="ui-g ui-fluid">
					<div class="ui-g-12">
        				<p:outputPanel styleClass="ui-g-12 ui-lg-3">
        					<div class="card shadow">
        						<p:commandLink action="chat">
	        						<p:graphicImage styleClass="card-img-top" title="Chat"
										value="#{resource['images/robot-conversacional.png']}"/>
									<div class="card-body">
										<h5 class="card-title">Chat interactivo</h5>
									</div>
								</p:commandLink>
        					</div>
        				</p:outputPanel>
        				<p:outputPanel styleClass="ui-g-12 ui-lg-3">
        					<div class="card shadow">
        						<p:commandLink action="tests">
	        						<p:graphicImage styleClass="card-img-top" title="Chat"
										value="#{resource['images/dna-test.png']}"/>
									<div class="card-body">
										<h5 class="card-title">Tests</h5>
									</div>
								</p:commandLink>
        					</div>
        				</p:outputPanel>
        				<p:outputPanel styleClass="ui-g-12 ui-lg-3">
        					<div class="card shadow">
        						<p:commandLink action="temaProgramacion">
	        						<p:graphicImage styleClass="card-img-top" title="Chat"
										value="#{resource['images/java.png']}"/>
									<div class="card-body">
										<h5 class="card-title">Programación</h5>
									</div>
								</p:commandLink>
        					</div>
        				</p:outputPanel>
        				<p:outputPanel styleClass="ui-g-12 ui-lg-3">
        					<div class="card shadow">
        						<p:commandLink action="temaAstronomia">
	        						<p:graphicImage styleClass="card-img-top" title="Chat"
										value="#{resource['images/astronomia.png']}"/>
									<div class="card-body">
										<h5 class="card-title">Astronomía</h5>
									</div>
								</p:commandLink>
        					</div>
        				</p:outputPanel>	
					</div>
				</div>
	
			</p:panel>
		</p:outputPanel>
	</ui:define>
</ui:composition>
